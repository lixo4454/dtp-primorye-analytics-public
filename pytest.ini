[pytest]
testpaths = tests
asyncio_mode = auto
# pytest-asyncio 0.25: общий loop для всех session-fixture'ов и тестов
# (per-test loop ломает asyncpg connection pool на Windows ProactorLoop)
asyncio_default_fixture_loop_scope = session
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::pytest.PytestUnraisableExceptionWarning
